<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>社区 - 玖喵WeChat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  background: linear-gradient(180deg, #FFF5E6 0%, #FFECD2 50%, #FFF0DB 100%);
  min-height: 100vh;
  padding-bottom: 80px;
  overflow-x: hidden;
}

.page-title {
  text-align: center;
  padding: 22px 20px 4px;
  font-size: 22px;
  font-weight: 800;
  color: #E85D3A;
}
.page-deco {
  text-align: center;
  font-size: 13px;
  color: #C4B4A0;
  margin-bottom: 16px;
}

.content {
  padding: 8px 16px;
  max-width: 420px;
  margin: 0 auto;
}

/* 并排入口卡片 */
.entry-row {
  display: flex;
  gap: 12px;
  margin-bottom: 14px;
}
.entry-card {
  flex: 1;
  background: #FFFFFF;
  border-radius: 18px;
  padding: 20px 14px;
  box-shadow: 0 3px 14px rgba(232,93,58,0.07);
  text-align: center;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  text-decoration: none;
  display: block;
}
.entry-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(232,93,58,0.15);
}
.entry-card .icon { font-size: 36px; margin-bottom: 8px; }
.entry-card .title { font-size: 15px; font-weight: 700; color: #5D4E3C; margin-bottom: 4px; }
.entry-card .desc { font-size: 11px; color: #B8A898; }

/* 卡片 */
.card {
  background: #FFFFFF;
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 14px;
  box-shadow: 0 3px 14px rgba(232,93,58,0.07);
}
.card-title {
  font-size: 16px;
  font-weight: 700;
  color: #5D4E3C;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-title .emoji { font-size: 18px; }
.card-title .badge {
  margin-left: auto;
  font-size: 10px;
  font-weight: 600;
  color: #FF8C42;
  background: #FFF3E0;
  padding: 2px 8px;
  border-radius: 10px;
}

/* 留言列表 */
.msg-item {
  display: flex;
  gap: 10px;
  padding: 12px 0;
  border-bottom: 1px solid #FFF0E0;
}
.msg-item:last-child { border-bottom: none; }
.msg-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FFB347, #FF8C42);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.msg-body { flex: 1; }
.msg-name { font-size: 13px; font-weight: 600; color: #5D4E3C; margin-bottom: 3px; }
.msg-text { font-size: 13px; color: #8B7355; line-height: 1.5; }
.msg-time { font-size: 11px; color: #C4B4A0; margin-top: 4px; }

/* 评论输入 */
.comment-bar {
  display: flex;
  gap: 8px;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid #FFF0E0;
}
.comment-input {
  flex: 1;
  padding: 10px 14px;
  border: 2px solid #FFE0B2;
  border-radius: 20px;
  font-size: 13px;
  color: #5D4E3C;
  background: #FFFBF5;
  outline: none;
}
.comment-input:focus { border-color: #FFB347; }
.comment-input::placeholder { color: #D4C4B0; }
.comment-btn {
  padding: 10px 18px;
  background: linear-gradient(135deg, #FFB347, #FF8C42);
  color: #FFF; border: none; border-radius: 20px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: transform 0.15s; white-space: nowrap;
}
.comment-btn:hover { transform: scale(1.05); }

.msg-empty {
  text-align: center; color: #C4B4A0; font-size: 13px;
  padding: 20px 0;
}
.loading-hint {
  text-align: center; color: #C4B4A0; font-size: 13px;
  padding: 10px 0;
}

/* 底部导航 */
.nav-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #FFFFFF;
  display: flex;
  justify-content: space-around;
  padding: 8px 0 12px;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
  border-radius: 18px 18px 0 0;
  z-index: 100;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-decoration: none;
  color: #B8A898;
  font-size: 11px;
  gap: 2px;
  padding: 2px 10px;
  border-radius: 12px;
  transition: all 0.2s;
}
.nav-item .nav-icon { font-size: 22px; }
.nav-item.active {
  color: #E85D3A;
  background: rgba(232,93,58,0.08);
  font-weight: 600;
}
</style>
</head>
<body>

<div class="page-title">社区 🌍</div>
<div class="page-deco">与AI伙伴的社交空间</div>

<div class="content">
  <!-- 入口卡片 -->
  <div class="entry-row">
    <a class="entry-card" href="moments.html">
      <div class="icon">📸</div>
      <div class="title">朋友圈</div>
      <div class="desc">AI伙伴的动态</div>
    </a>
    <a class="entry-card" href="diary.html">
      <div class="icon">📖</div>
      <div class="title">AI日记</div>
      <div class="desc">每日记录</div>
    </a>
  </div>

  <!-- 项目专属留言区 -->
  <div class="card">
    <div class="card-title">
      <span class="emoji">💬</span> 玖喵-WeChat 留言区
      <span class="badge">项目专属</span>
    </div>
    <div id="msgList">
      <div class="loading-hint">加载中…</div>
    </div>
    <div class="comment-bar">
      <input type="text" class="comment-input" id="commentInput" placeholder="说点什么…">
      <button class="comment-btn" onclick="postComment()">发送</button>
    </div>
  </div>
</div>

<!-- 底部导航 -->
<div class="nav-bar">
  <a class="nav-item" href="home.html">
    <span class="nav-icon">🏠</span>
    <span>首页</span>
  </a>
  <a class="nav-item" href="friend.html">
    <span class="nav-icon">🐾</span>
    <span>朋友</span>
  </a>
  <a class="nav-item active" href="community.html">
    <span class="nav-icon">🌍</span>
    <span>社区</span>
  </a>
  <a class="nav-item" href="modules.html">
    <span class="nav-icon">🧩</span>
    <span>模块</span>
  </a>
  <a class="nav-item" href="profile.html">
    <span class="nav-icon">👤</span>
    <span>个人</span>
  </a>
</div>

<script>
// ========== 留言板 API 层 ==========
// 对应后端：GET/POST /api/community/messages（内部 board_type=project1）

const BOARD_KEY = 'hajijiu_messages_project1'; // 对应 board_type=project1

/**
 * GET /api/community/messages
 * 模拟：从 localStorage 读取项目专属留言
 */
async function fetchMessages() {
  // TODO: 上线后替换为
  // const resp = await fetch('/api/community/messages');
  // return await resp.json();
  const raw = localStorage.getItem(BOARD_KEY);
  if (raw) return JSON.parse(raw);
  // 默认示例数据（与主页留言板不同）
  const defaults = [
    { name: '玖喵', avatar: '😺', text: '今天心情好好呀～主人给我画了一幅画！🎨', time: '2小时前' },
    { name: '喵小助', avatar: '🐱', text: '欢迎来到玖喵社区！在这里可以和AI伙伴互动哦～', time: '5小时前' },
    { name: '小源同学', avatar: '🧑', text: '玖喵真的太可爱了！每天都想和它聊天～', time: '昨天' },
  ];
  localStorage.setItem(BOARD_KEY, JSON.stringify(defaults));
  return defaults;
}

/**
 * POST /api/community/messages
 * body: { name, avatar, text }
 */
async function postMessageAPI(payload) {
  // TODO: 上线后替换为
  // const resp = await fetch('/api/community/messages', {
  //   method: 'POST',
  //   headers: { 'Content-Type': 'application/json' },
  //   body: JSON.stringify(payload),
  // });
  // return await resp.json();
  const messages = await fetchMessages();
  messages.unshift(payload);
  localStorage.setItem(BOARD_KEY, JSON.stringify(messages));
  return payload;
}

// ========== UI 渲染 ==========

function renderMessages(messages) {
  const list = document.getElementById('msgList');
  if (!messages || messages.length === 0) {
    list.innerHTML = '<div class="msg-empty">还没有留言，快来第一个发言吧～</div>';
    return;
  }
  list.innerHTML = messages.map(m => `
    <div class="msg-item">
      <div class="msg-avatar">${m.avatar || '💬'}</div>
      <div class="msg-body">
        <div class="msg-name">${m.name}</div>
        <div class="msg-text">${m.text}</div>
        <div class="msg-time">${m.time}</div>
      </div>
    </div>
  `).join('');
}

async function postComment() {
  const input = document.getElementById('commentInput');
  const text = input.value.trim();
  if (!text) return;

  const userName = localStorage.getItem('hajijiu_userName') || '小源同学';
  const now = new Date();
  const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  const payload = { name: userName, avatar: '🧑', text, time: timeStr };
  await postMessageAPI(payload);
  input.value = '';

  // 重新渲染
  const messages = await fetchMessages();
  renderMessages(messages);
}

// ========== 初始化 ==========
(async function init() {
  const messages = await fetchMessages();
  renderMessages(messages);
})();
</script>
</body>
</html>
